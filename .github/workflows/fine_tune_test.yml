name: Fine-tuning — SmolLM2 pipeline validation

on:
  workflow_dispatch:
  push:
    paths:
      - 'plantuml-plugin/src/functionalTest/resources/python/**'
      - 'plantuml-plugin/src/functionalTest/kotlin/plantuml/SmolLMFineTuneFunctionalTest.kt'
      - 'plantuml-plugin/build.gradle.kts'

permissions:
  contents: read

jobs:
  fine-tune:
    name: SmolLM2-135M LoRA fine-tune (testcontainers Python)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'temurin'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install HuggingFace CLI
        run: pip install "huggingface_hub[hf_transfer]>=0.25"

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-smollm2-135m-instruct-${{ hashFiles('plantuml-plugin/src/functionalTest/resources/python/requirements.txt') }}
          restore-keys: |
            hf-smollm2-135m-instruct-
            hf-smollm2-135m-

      - name: Cache Gradle wrapper
        uses: actions/cache@v4
        with:
          path: ~/.gradle/wrapper
          key: gradle-wrapper-${{ hashFiles('plantuml-plugin/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-wrapper-

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/jdks
          key: gradle-deps-${{ hashFiles('plantuml-plugin/gradle/libs.versions.toml', 'plantuml-plugin/*.gradle.kts') }}
          restore-keys: gradle-deps-

      - name: Download SmolLM2-135M-Instruct model
        working-directory: plantuml-plugin
        run: ../gradlew downloadFineTuningModel --no-daemon

      - name: Run fine-tuning functional tests
        working-directory: plantuml-plugin
        run: ../gradlew functionalTest -Ptest.tags="fine-tune" --no-daemon

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fine-tune-test-results
          path: |
            plantuml-plugin/build/reports/tests/functionalTest/
